default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # Non-strict + ignore_missing_imports (see pyproject), so no extra
        # dependencies are needed for the isolated hook environment.

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: env -u PYTHONPATH uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
